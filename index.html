<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쉴랑게 오프라인설명회 책자</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { margin: 0; background-color: #525659; display: flex; flex-direction: column; align-items: center; }
        .page-container { margin-bottom: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); width: 100%; max-width: 800px; }
        canvas { width: 100% !important; height: auto !important; display: block; }
        #loading { color: white; padding: 20px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="loading">홍보물을 불러오는 중입니다...</div>
    <div id="pdf-viewer"></div>

    <script>
        // 업로드한 PDF 파일명을 여기에 적으세요
        const url = '2026shilange-introduction.pfd'; 

        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        const container = document.getElementById('pdf-viewer');

        pdfjsLib.getDocument(url).promise.then(pdf => {
            pdfDoc = pdf;
            document.getElementById('loading').style.display = 'none';
            
            // 1페이지부터 마지막 페이지까지 순차적으로 렌더링
            for (let i = 1; i <= pdf.numPages; i++) {
                renderPage(i);
            }
        });

        function renderPage(num) {
            const canvas = document.createElement('canvas');
            const div = document.createElement('div');
            div.className = 'page-container';
            div.appendChild(canvas);
            container.appendChild(div);

            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: 1.5 });
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                page.render({ canvasContext: context, viewport: viewport });
            });
        }
    </script>
</body>
</html>
